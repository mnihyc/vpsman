name: vpsman

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpsman}
      POSTGRES_USER: ${POSTGRES_USER:-vpsman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpsman}
    volumes:
      - ./runtime/postgres/data:/var/lib/postgresql/data

  api:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-api
    environment:
      VPSMAN_API_BIND: ${VPSMAN_API_BIND:-0.0.0.0:8080}
      VPSMAN_POSTGRES_URL: ${VPSMAN_POSTGRES_URL:-postgres://vpsman:vpsman@postgres:5432/vpsman}
      VPSMAN_MIGRATIONS_DIR: ${VPSMAN_MIGRATIONS_DIR:-/opt/vpsman/migrations}
      VPSMAN_INTERNAL_TOKEN: ${VPSMAN_INTERNAL_TOKEN:-}
      VPSMAN_GATEWAY_CONTROL_URL: ${VPSMAN_GATEWAY_CONTROL_URL:-http://gateway:9444}
      VPSMAN_BACKUP_OBJECT_STORE_DIR: ${VPSMAN_BACKUP_OBJECT_STORE_DIR:-/var/lib/vpsman/objects/backups}
      VPSMAN_BACKUP_UPLOAD_STAGING_DIR: ${VPSMAN_BACKUP_UPLOAD_STAGING_DIR:-/var/lib/vpsman/objects/backups/.upload-sessions}
      VPSMAN_UPDATE_OBJECT_STORE_DIR: ${VPSMAN_UPDATE_OBJECT_STORE_DIR:-/var/lib/vpsman/objects/updates}
      VPSMAN_OBJECT_ENDPOINT: ${VPSMAN_OBJECT_ENDPOINT:-}
      VPSMAN_OBJECT_BUCKET: ${VPSMAN_OBJECT_BUCKET:-}
      VPSMAN_OBJECT_ACCESS_KEY: ${VPSMAN_OBJECT_ACCESS_KEY:-}
      VPSMAN_OBJECT_SECRET_KEY: ${VPSMAN_OBJECT_SECRET_KEY:-}
      VPSMAN_OBJECT_REGION: ${VPSMAN_OBJECT_REGION:-us-east-1}
      VPSMAN_OBJECT_CREATE_BUCKET: ${VPSMAN_OBJECT_CREATE_BUCKET:-false}
      VPSMAN_UPDATE_OBJECT_ENDPOINT: ${VPSMAN_UPDATE_OBJECT_ENDPOINT:-}
      VPSMAN_UPDATE_OBJECT_BUCKET: ${VPSMAN_UPDATE_OBJECT_BUCKET:-}
      VPSMAN_UPDATE_OBJECT_ACCESS_KEY: ${VPSMAN_UPDATE_OBJECT_ACCESS_KEY:-}
      VPSMAN_UPDATE_OBJECT_SECRET_KEY: ${VPSMAN_UPDATE_OBJECT_SECRET_KEY:-}
      VPSMAN_UPDATE_OBJECT_REGION: ${VPSMAN_UPDATE_OBJECT_REGION:-us-east-1}
      VPSMAN_UPDATE_OBJECT_CREATE_BUCKET: ${VPSMAN_UPDATE_OBJECT_CREATE_BUCKET:-false}
      VPSMAN_UPDATE_ARTIFACT_PUBLIC_BASE_URL: ${VPSMAN_UPDATE_ARTIFACT_PUBLIC_BASE_URL:-}
      VPSMAN_AGENT_UPDATE_ALLOWED_CHANNELS: ${VPSMAN_AGENT_UPDATE_ALLOWED_CHANNELS:-}
      VPSMAN_AGENT_UPDATE_TRUSTED_SIGNING_KEYS_HEX: ${VPSMAN_AGENT_UPDATE_TRUSTED_SIGNING_KEYS_HEX:-}
      VPSMAN_JOB_OUTPUT_ARTIFACT_MIN_BYTES: ${VPSMAN_JOB_OUTPUT_ARTIFACT_MIN_BYTES:-32768}
      VPSMAN_AGENT_UPDATE_HEARTBEAT_TIMEOUT_SECS: ${VPSMAN_AGENT_UPDATE_HEARTBEAT_TIMEOUT_SECS:-900}
      VPSMAN_AGENT_UPDATE_RECONCILE_INTERVAL_SECS: ${VPSMAN_AGENT_UPDATE_RECONCILE_INTERVAL_SECS:-30}
      VPSMAN_REQUIRE_REGISTERED_AGENT_UPDATES: ${VPSMAN_REQUIRE_REGISTERED_AGENT_UPDATES:-false}
      VPSMAN_ALERT_MEMORY_AVAILABLE_WARNING_RATIO: ${VPSMAN_ALERT_MEMORY_AVAILABLE_WARNING_RATIO:-0.20}
      VPSMAN_ALERT_MEMORY_AVAILABLE_CRITICAL_RATIO: ${VPSMAN_ALERT_MEMORY_AVAILABLE_CRITICAL_RATIO:-0.10}
      VPSMAN_ALERT_DISK_AVAILABLE_WARNING_RATIO: ${VPSMAN_ALERT_DISK_AVAILABLE_WARNING_RATIO:-0.20}
      VPSMAN_ALERT_DISK_AVAILABLE_CRITICAL_RATIO: ${VPSMAN_ALERT_DISK_AVAILABLE_CRITICAL_RATIO:-0.10}
      VPSMAN_ALERT_CPU_LOAD_WARNING: ${VPSMAN_ALERT_CPU_LOAD_WARNING:-2.0}
      VPSMAN_ALERT_CPU_LOAD_CRITICAL: ${VPSMAN_ALERT_CPU_LOAD_CRITICAL:-4.0}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
    depends_on:
      - postgres

  gateway:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-gateway
    environment:
      VPSMAN_GATEWAY_BIND: ${VPSMAN_GATEWAY_BIND:-0.0.0.0:9443}
      VPSMAN_GATEWAY_CONTROL_BIND: ${VPSMAN_GATEWAY_CONTROL_BIND:-0.0.0.0:9444}
      VPSMAN_GATEWAY_PRIVATE_KEY_HEX: ${VPSMAN_GATEWAY_PRIVATE_KEY_HEX:-}
      VPSMAN_GATEWAY_EXPECT_CLIENT_PUBLIC_KEY_HEX: ${VPSMAN_GATEWAY_EXPECT_CLIENT_PUBLIC_KEY_HEX:-}
      VPSMAN_API_URL: ${VPSMAN_API_URL:-http://api:8080}
      VPSMAN_INTERNAL_TOKEN: ${VPSMAN_INTERNAL_TOKEN:-}
      VPSMAN_PRIVILEGE_VERIFIER_KEY_HEX: ${VPSMAN_PRIVILEGE_VERIFIER_KEY_HEX:-}
      VPSMAN_GATEWAY_ID: ${VPSMAN_GATEWAY_ID:-compose-gateway}
    ports:
      - "127.0.0.1:9443:9443"
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
    depends_on:
      - api

  worker:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-worker
    environment:
      VPSMAN_POSTGRES_URL: ${VPSMAN_POSTGRES_URL:-postgres://vpsman:vpsman@postgres:5432/vpsman}
      VPSMAN_MIGRATIONS_DIR: ${VPSMAN_MIGRATIONS_DIR:-/opt/vpsman/migrations}
      VPSMAN_WORKER_TICK_SECS: ${VPSMAN_WORKER_TICK_SECS:-30}
      VPSMAN_WORKER_ID: ${VPSMAN_WORKER_ID:-}
      VPSMAN_WORKER_LEASE_SECS: ${VPSMAN_WORKER_LEASE_SECS:-60}
      VPSMAN_AGENT_OFFLINE_TIMEOUT_SECS: ${VPSMAN_AGENT_OFFLINE_TIMEOUT_SECS:-300}
      VPSMAN_WORKER_SCHEDULE_COMMAND_TIMEOUT_SECS: ${VPSMAN_WORKER_SCHEDULE_COMMAND_TIMEOUT_SECS:-30}
      VPSMAN_WORKER_ROLLOUT_HEARTBEAT_TIMEOUT_SECS: ${VPSMAN_WORKER_ROLLOUT_HEARTBEAT_TIMEOUT_SECS:-900}
      VPSMAN_WORKER_ROLLOUT_RECONCILE_LIMIT: ${VPSMAN_WORKER_ROLLOUT_RECONCILE_LIMIT:-50}
      VPSMAN_WORKER_ROLLOUT_WORKER_ID: ${VPSMAN_WORKER_ROLLOUT_WORKER_ID:-}
      VPSMAN_WORKER_ROLLOUT_LEASE_SECS: ${VPSMAN_WORKER_ROLLOUT_LEASE_SECS:-60}
      VPSMAN_WORKER_NOTIFICATION_DELIVERY_LIMIT: ${VPSMAN_WORKER_NOTIFICATION_DELIVERY_LIMIT:-25}
      VPSMAN_WORKER_NOTIFICATION_RETENTION_DAYS: ${VPSMAN_WORKER_NOTIFICATION_RETENTION_DAYS:-90}
      VPSMAN_WORKER_NOTIFICATION_RETENTION_PRUNE_LIMIT: ${VPSMAN_WORKER_NOTIFICATION_RETENTION_PRUNE_LIMIT:-1000}
      VPSMAN_WORKER_NOTIFICATION_WEBHOOK_TIMEOUT_SECS: ${VPSMAN_WORKER_NOTIFICATION_WEBHOOK_TIMEOUT_SECS:-5}
      VPSMAN_WORKER_BACKUP_POLICY_PRUNE_ENABLED: ${VPSMAN_WORKER_BACKUP_POLICY_PRUNE_ENABLED:-false}
      VPSMAN_WORKER_BACKUP_POLICY_PRUNE_LIMIT: ${VPSMAN_WORKER_BACKUP_POLICY_PRUNE_LIMIT:-50}
      VPSMAN_WORKER_BACKUP_POLICY_PRUNE_DRY_RUN: ${VPSMAN_WORKER_BACKUP_POLICY_PRUNE_DRY_RUN:-false}
      VPSMAN_WORKER_BACKUP_POLICY_PRUNE_INCLUDE_DISABLED: ${VPSMAN_WORKER_BACKUP_POLICY_PRUNE_INCLUDE_DISABLED:-false}
      VPSMAN_WORKER_BACKUP_POLICY_PRUNE_DELETE_OBJECTS: ${VPSMAN_WORKER_BACKUP_POLICY_PRUNE_DELETE_OBJECTS:-false}
      VPSMAN_WORKER_BACKUP_POLICY_PRUNE_OBJECT_STORE_DIR: ${VPSMAN_WORKER_BACKUP_POLICY_PRUNE_OBJECT_STORE_DIR:-/var/lib/vpsman/objects/backups}
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
    depends_on:
      - postgres
      - api

  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:5173:80"
    volumes:
      - ./runtime/frontend/current/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
