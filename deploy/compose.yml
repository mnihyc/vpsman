name: vpsman

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpsman}
      POSTGRES_USER: ${POSTGRES_USER:-vpsman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpsman}
    volumes:
      - ./runtime/postgres/data:/var/lib/postgresql/data

  api:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-api
    environment:
      VPSMAN_SUITE_CONFIG: /etc/vpsman/vpsman.toml
      # Container-internal only; this service intentionally has no host API port.
      VPSMAN_API_BIND: 0.0.0.0:8080
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
      - ./config:/etc/vpsman:rw
      - type: tmpfs
        target: /etc/vpsman/secrets
        read_only: true
      - type: bind
        source: ./config/secrets/vpsman_internal_token
        target: /run/secrets/vpsman_internal_token
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      - postgres

  gateway:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-gateway
    environment:
      VPSMAN_SUITE_CONFIG: /etc/vpsman/vpsman.toml
      # Docker publishes to the container network address, while the host
      # boundary remains loopback-only through the ports mapping below.
      VPSMAN_GATEWAY_BIND: 0.0.0.0:9443
    ports:
      - "127.0.0.1:9443:9443"
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
      - ./config:/etc/vpsman:ro
      - type: tmpfs
        target: /etc/vpsman/secrets
        read_only: true
      - type: bind
        source: ./config/secrets/vpsman_internal_token
        target: /run/secrets/vpsman_internal_token
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./config/secrets/vpsman_gateway_private_key_hex
        target: /run/secrets/vpsman_gateway_private_key_hex
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./config/secrets/vpsman_privilege_verifier_key_hex
        target: /run/secrets/vpsman_privilege_verifier_key_hex
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      - api

  worker:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-worker
    environment:
      VPSMAN_SUITE_CONFIG: /etc/vpsman/vpsman.toml
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
      - ./config:/etc/vpsman:ro
      - type: tmpfs
        target: /etc/vpsman/secrets
        read_only: true
    depends_on:
      - postgres
      - api

  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${VPSMAN_FRONTEND_BIND:-127.0.0.1:5173}:80"
    volumes:
      - ./runtime/frontend/current/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
