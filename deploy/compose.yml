name: vpsman

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpsman}
      POSTGRES_USER: ${POSTGRES_USER:-vpsman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpsman}
    volumes:
      - ./runtime/postgres/data:/var/lib/postgresql/data

  api:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-api
    environment:
      VPSMAN_SUITE_CONFIG: /etc/vpsman/vpsman.toml
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
      - ../config/vpsman.toml:/etc/vpsman/vpsman.toml:ro
      - ../config/secrets:/run/secrets:ro
    depends_on:
      - postgres

  gateway:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-gateway
    environment:
      VPSMAN_SUITE_CONFIG: /etc/vpsman/vpsman.toml
    ports:
      - "127.0.0.1:9443:9443"
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
      - ../config/vpsman.toml:/etc/vpsman/vpsman.toml:ro
      - ../config/secrets:/run/secrets:ro
    depends_on:
      - api

  worker:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-worker
    environment:
      VPSMAN_SUITE_CONFIG: /etc/vpsman/vpsman.toml
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
      - ../config/vpsman.toml:/etc/vpsman/vpsman.toml:ro
      - ../config/secrets:/run/secrets:ro
    depends_on:
      - postgres
      - api

  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:5173:80"
    volumes:
      - ./runtime/frontend/current/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
