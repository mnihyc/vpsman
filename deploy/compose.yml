name: vpsman

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./runtime/postgres/data:/var/lib/postgresql/data

  api:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-api
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
    depends_on:
      - postgres

  gateway:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-gateway
    env_file: .env
    ports:
      - "9443:9443"
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
    depends_on:
      - api

  worker:
    image: debian:bookworm-slim
    restart: unless-stopped
    working_dir: /opt/vpsman
    command: ./bin/vpsman-worker
    env_file: .env
    volumes:
      - ./runtime/server/current:/opt/vpsman:ro
      - ./runtime/data:/var/lib/vpsman
    depends_on:
      - postgres
      - api

  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      - ./runtime/frontend/current/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
