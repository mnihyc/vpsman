# Bootstrap-only agent config.
#
# The API owns runtime config. Do not put backup, update, execution,
# telemetry, tunnel, routing, traffic, template, or policy sections in this
# file. Agents load this file only to connect and authenticate to the gateway;
# after hello they request the server-applied runtime config state, which is
# pushed as exclusive runtime_config_sync jobs. A failed sync does not advance
# the server's per-VPS applied runtime config record.

client_id = "agent-nrt-04"

[noise]
# Generated before install with `vpsctl noise-keygen`; register the matching
# public key with privileged `vpsctl agent-identity-upsert`.
mode = "enrolled_ik"
client_private_key_hex = "1111111111111111111111111111111111111111111111111111111111111111"
server_public_key_hex = "2222222222222222222222222222222222222222222222222222222222222222"

[auth]
# Bootstrap connectivity only. Job/runtime limits are server-managed runtime
# config after the agent connects.
gateway_retry_secs = 60
gateway_connect_timeout_secs = 10

[[tcp_endpoints]]
label = "primary"
tcp_addr = "panel.example.com:9443"
priority = 10

[[tcp_endpoints]]
label = "backup"
tcp_addr = "panel-backup.example.com:9443"
priority = 20
