name: Full Release Check

on:
  workflow_dispatch:
    inputs:
      run_s3_smokes:
        description: Run optional S3/MinIO smokes
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-check:
    name: Aggregate release gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install musl targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Install release-check shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq

      - name: Install frontend dependencies and Chrome for Playwright channel tests
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chrome

      - name: Run aggregate release check
        env:
          VPSMAN_RELEASE_RUN_S3_SMOKES: ${{ inputs.run_s3_smokes && '1' || '0' }}
        run: bash scripts/release-check.sh

      - name: Upload release-check logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-check-logs
          path: target/release-check/
