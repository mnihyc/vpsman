name: Full Release Check

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-check:
    name: Aggregate release gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install musl targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

      - name: Build release server binaries
        run: cargo build --release -p vpsman-api -p vpsman-gateway -p vpsman-worker

      - name: Build static agent and CLI
        run: |
          cargo build --release -p vpsman-agent --target x86_64-unknown-linux-musl
          cargo build --release -p vpsman-agent --target aarch64-unknown-linux-musl
          cargo build --release -p vpsctl --target x86_64-unknown-linux-musl
          cargo build --release -p vpsctl --target aarch64-unknown-linux-musl

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Public tree hygiene
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^(AGENTS\.md|DESIGN\.md|PROGRESS\.md|TODO_LIST\.md|DESIGN_GOAL\.md|docs/|tutorials/|scripts/|example_legacy_bird2_config\.zip)$|^(docs|tutorials|scripts)/'; then
            echo "private/local-only files must not be tracked"
            exit 1
          fi

      - name: Docker Compose config
        run: docker compose -f deploy/compose.yml config
