name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-binaries:
    name: Linux binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install musl targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Prepare musl C tools
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/musl-tools"

          cat > "$RUNNER_TEMP/musl-tools/x86_64-linux-musl-gcc" <<'SH'
          #!/usr/bin/env sh
          exec clang --target=x86_64-unknown-linux-musl "$@"
          SH

          cat > "$RUNNER_TEMP/musl-tools/aarch64-linux-musl-gcc" <<'SH'
          #!/usr/bin/env sh
          exec clang --target=aarch64-unknown-linux-musl "$@"
          SH

          cat > "$RUNNER_TEMP/musl-tools/x86_64-linux-musl-ar" <<'SH'
          #!/usr/bin/env sh
          exec llvm-ar "$@"
          SH

          cat > "$RUNNER_TEMP/musl-tools/aarch64-linux-musl-ar" <<'SH'
          #!/usr/bin/env sh
          exec llvm-ar "$@"
          SH

          chmod +x "$RUNNER_TEMP"/musl-tools/*
          echo "$RUNNER_TEMP/musl-tools" >> "$GITHUB_PATH"

          command -v clang
          command -v llvm-ar
          PATH="$RUNNER_TEMP/musl-tools:$PATH" command -v x86_64-linux-musl-gcc
          PATH="$RUNNER_TEMP/musl-tools:$PATH" command -v x86_64-linux-musl-ar
          PATH="$RUNNER_TEMP/musl-tools:$PATH" command -v aarch64-linux-musl-gcc
          PATH="$RUNNER_TEMP/musl-tools:$PATH" command -v aarch64-linux-musl-ar

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Resolve release identity
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "release workflow must run from a tag push" >&2
            exit 1
          fi
          release_tag="${GITHUB_REF_NAME}"
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "release tag must look like v1.2.3 or v1.2.3-rc.1: $release_tag" >&2
            exit 1
          fi
          release_version="${release_tag#v}"
          {
            echo "VPSMAN_RELEASE_TAG=$release_tag"
            echo "VPSMAN_RELEASE_VERSION=$release_version"
          } >> "$GITHUB_ENV"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-cargo-${{ runner.os }}-

      - name: Build server binaries
        run: cargo build --release -p vpsman-api -p vpsman-gateway -p vpsman-worker

      - name: Build static agent and CLI
        run: |
          cargo build --release -p vpsman-agent --target x86_64-unknown-linux-musl
          cargo build --release -p vpsman-agent --target aarch64-unknown-linux-musl
          cargo build --release -p vpsctl --target x86_64-unknown-linux-musl
          cargo build --release -p vpsctl --target aarch64-unknown-linux-musl

      - name: Stage binaries
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/assets release-artifacts/server/bin release-artifacts/server/migrations
          cp target/release/vpsman-api release-artifacts/server/bin/vpsman-api
          cp target/release/vpsman-gateway release-artifacts/server/bin/vpsman-gateway
          cp target/release/vpsman-worker release-artifacts/server/bin/vpsman-worker
          cp migrations/*.sql release-artifacts/server/migrations/
          (cd release-artifacts/server && zip -qr ../assets/vpsman-server-linux-x86_64.zip .)
          cp target/x86_64-unknown-linux-musl/release/vpsman-agent release-artifacts/assets/vpsman-agent-linux-x86_64-musl
          cp target/aarch64-unknown-linux-musl/release/vpsman-agent release-artifacts/assets/vpsman-agent-linux-aarch64-musl
          cp target/x86_64-unknown-linux-musl/release/vpsctl release-artifacts/assets/vpsctl-linux-x86_64-musl
          cp target/aarch64-unknown-linux-musl/release/vpsctl release-artifacts/assets/vpsctl-linux-aarch64-musl

      - name: Verify binary release identity
        run: |
          set -euo pipefail
          agent_version="$(release-artifacts/assets/vpsman-agent-linux-x86_64-musl --version)"
          cli_version="$(release-artifacts/assets/vpsctl-linux-x86_64-musl --version)"
          case "$agent_version" in
            *"$VPSMAN_RELEASE_VERSION"*) ;;
            *)
              echo "agent version does not contain release version $VPSMAN_RELEASE_VERSION: $agent_version" >&2
              exit 1
              ;;
          esac
          case "$cli_version" in
            *"$VPSMAN_RELEASE_VERSION"*) ;;
            *)
              echo "vpsctl version does not contain release version $VPSMAN_RELEASE_VERSION: $cli_version" >&2
              exit 1
              ;;
          esac

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: vpsman-linux-binaries
          path: release-artifacts/assets/*

  frontend:
    name: Frontend artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Package frontend
        run: tar -C frontend -czf vpsman-frontend-dist.tar.gz dist

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: vpsman-frontend-dist
          path: vpsman-frontend-dist.tar.gz

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - linux-binaries
      - frontend
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-downloads

      - name: Resolve release tag
        id: release-tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "release workflow must run from a tag push" >&2
            exit 1
          fi
          release_tag="${GITHUB_REF_NAME}"
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "release tag must look like v1.2.3 or v1.2.3-rc.1: $release_tag" >&2
            exit 1
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=${release_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Flatten release assets
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release-tag.outputs.version }}
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          cp release-downloads/vpsman-linux-binaries/* release-assets/
          cp release-downloads/vpsman-frontend-dist/vpsman-frontend-dist.tar.gz release-assets/
          python3 -c '
          import json
          import os
          from pathlib import Path
          from urllib.parse import quote

          root = Path("release-assets")
          asset_names = sorted(path.name for path in root.iterdir() if path.is_file())
          metadata_path = Path("version-template.json")
          metadata = json.loads(metadata_path.read_text()) if metadata_path.exists() else {}
          release_tag = os.environ["RELEASE_TAG"]
          release_base_url = (
              "https://github.com/"
              + os.environ["GITHUB_REPOSITORY"]
              + "/releases/download/"
              + quote(release_tag, safe="")
          )
          def release_asset(name):
              return {
                  "name": name,
                  "download_url": release_base_url + "/" + quote(name, safe=""),
              }
          metadata.update(
              {
                  "schema_version": 2,
                  "project": "vpsman",
                  "tag": release_tag,
                  "version": os.environ["RELEASE_VERSION"],
                  "commit": os.environ["GITHUB_SHA"],
                  "assets": [release_asset(name) for name in asset_names],
                  "checksum_manifest": release_asset("SHA256SUMS"),
              }
          )
          (root / "version.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n"
          )
          '
          python3 -c '
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("release-assets/version.json").read_text())
          if metadata.get("tag") != os.environ["RELEASE_TAG"]:
              raise SystemExit("version.json tag does not match release tag")
          if metadata.get("version") != os.environ["RELEASE_VERSION"]:
              raise SystemExit("version.json version does not match release version")
          '
          (cd release-assets && sha256sum * > SHA256SUMS)

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            expected_assets="$(mktemp)"
            current_assets="$(mktemp)"
            find release-assets -maxdepth 1 -type f -printf '%f\n' | sort > "$expected_assets"
            gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort > "$current_assets"
            while IFS= read -r asset; do
              if ! grep -Fxq "$asset" "$expected_assets"; then
                gh release delete-asset "$RELEASE_TAG" "$asset" --yes
              fi
            done < "$current_assets"
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
            gh release edit "$RELEASE_TAG" \
              --title "vpsman $RELEASE_TAG" \
              --target "$GITHUB_SHA"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "vpsman $RELEASE_TAG" \
              --generate-notes \
              --verify-tag \
              --target "$GITHUB_SHA"
          fi
