name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag name, such as v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-binaries:
    name: Linux binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install musl targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-cargo-${{ runner.os }}-

      - name: Build server binaries
        run: cargo build --release -p vpsman-api -p vpsman-gateway -p vpsman-worker

      - name: Build static agent and CLI
        run: |
          cargo build --release -p vpsman-agent --target x86_64-unknown-linux-musl
          cargo build --release -p vpsman-agent --target aarch64-unknown-linux-musl
          cargo build --release -p vpsctl --target x86_64-unknown-linux-musl
          cargo build --release -p vpsctl --target aarch64-unknown-linux-musl

      - name: Stage binaries
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/assets release-artifacts/server/bin release-artifacts/server/migrations
          cp target/release/vpsman-api release-artifacts/server/bin/vpsman-api
          cp target/release/vpsman-gateway release-artifacts/server/bin/vpsman-gateway
          cp target/release/vpsman-worker release-artifacts/server/bin/vpsman-worker
          cp migrations/*.sql release-artifacts/server/migrations/
          (cd release-artifacts/server && zip -qr ../assets/vpsman-server-linux-x86_64.zip .)
          cp target/x86_64-unknown-linux-musl/release/vpsman-agent release-artifacts/assets/vpsman-agent-linux-x86_64-musl
          cp target/aarch64-unknown-linux-musl/release/vpsman-agent release-artifacts/assets/vpsman-agent-linux-aarch64-musl
          cp target/x86_64-unknown-linux-musl/release/vpsctl release-artifacts/assets/vpsctl-linux-x86_64-musl
          cp target/aarch64-unknown-linux-musl/release/vpsctl release-artifacts/assets/vpsctl-linux-aarch64-musl

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: vpsman-linux-binaries
          path: release-artifacts/assets/*

  frontend:
    name: Frontend artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Package frontend
        run: tar -C frontend -czf vpsman-frontend-dist.tar.gz dist

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: vpsman-frontend-dist
          path: vpsman-frontend-dist.tar.gz

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - linux-binaries
      - frontend
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-downloads

      - name: Resolve release tag
        id: release-tag
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Flatten release assets
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          cp release-downloads/vpsman-linux-binaries/* release-assets/
          cp release-downloads/vpsman-frontend-dist/vpsman-frontend-dist.tar.gz release-assets/
          python3 -c '
          import json
          import os
          from pathlib import Path

          root = Path("release-assets")
          assets = sorted(path.name for path in root.iterdir() if path.is_file())
          metadata_path = Path("version.json")
          metadata = json.loads(metadata_path.read_text()) if metadata_path.exists() else {}
          metadata.update(
              {
                  "schema_version": 1,
                  "project": "vpsman",
                  "tag": os.environ["RELEASE_TAG"],
                  "version": os.environ["RELEASE_TAG"].removeprefix("v"),
                  "commit": os.environ["GITHUB_SHA"],
                  "assets": assets,
              }
          )
          (root / "version.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n"
          )
          '
          (cd release-assets && sha256sum * > SHA256SUMS)

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            expected_assets="$(mktemp)"
            current_assets="$(mktemp)"
            find release-assets -maxdepth 1 -type f -printf '%f\n' | sort > "$expected_assets"
            gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort > "$current_assets"
            while IFS= read -r asset; do
              if ! grep -Fxq "$asset" "$expected_assets"; then
                gh release delete-asset "$RELEASE_TAG" "$asset" --yes
              fi
            done < "$current_assets"
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
            gh release edit "$RELEASE_TAG" \
              --title "vpsman $RELEASE_TAG" \
              --target "$GITHUB_SHA"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "vpsman $RELEASE_TAG" \
              --generate-notes \
              --verify-tag \
              --target "$GITHUB_SHA"
          fi
