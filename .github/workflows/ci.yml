name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: rustup show

      - name: Install musl targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Build static client and CLI
        run: |
          cargo build --release -p vpsman-agent --target x86_64-unknown-linux-musl
          cargo build --release -p vpsman-agent --target aarch64-unknown-linux-musl
          cargo build --release -p vpsctl --target x86_64-unknown-linux-musl
          cargo build --release -p vpsctl --target aarch64-unknown-linux-musl

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Install Chrome for Playwright channel tests
        working-directory: frontend
        run: npx playwright install --with-deps chrome

      - name: Console layout smoke
        run: bash scripts/smoke-frontend-console-layout.sh

  docs-and-deploy:
    name: Documentation and deploy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shell audit tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Tutorial audit
        run: bash scripts/audit-tutorials.sh

      - name: Migration compatibility audit
        run: bash scripts/audit-migrations.sh

      - name: Large-file audit
        run: bash scripts/audit-large-files.sh

      - name: Customizability audit
        run: bash scripts/audit-customizability.sh

      - name: Security sweep
        run: bash scripts/security-sweep.sh

      - name: Repository hygiene
        run: bash scripts/scan-repo-hygiene.sh

      - name: Docker Compose config
        run: docker compose -f deploy/compose.yml config
