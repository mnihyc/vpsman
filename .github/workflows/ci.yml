name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vpsman
          POSTGRES_USER: vpsman
          POSTGRES_PASSWORD: vpsman
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vpsman -d vpsman"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      VPSMAN_TEST_POSTGRES_URL: postgres://vpsman:vpsman@127.0.0.1:5432/vpsman
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: rustup show

      - name: Install musl targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Prepare musl C tools
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/musl-tools"

          cat > "$RUNNER_TEMP/musl-tools/x86_64-linux-musl-gcc" <<'SH'
          #!/usr/bin/env sh
          exec clang --target=x86_64-unknown-linux-musl "$@"
          SH

          cat > "$RUNNER_TEMP/musl-tools/aarch64-linux-musl-gcc" <<'SH'
          #!/usr/bin/env sh
          exec clang --target=aarch64-unknown-linux-musl "$@"
          SH

          cat > "$RUNNER_TEMP/musl-tools/x86_64-linux-musl-ar" <<'SH'
          #!/usr/bin/env sh
          exec ar "$@"
          SH

          cat > "$RUNNER_TEMP/musl-tools/aarch64-linux-musl-ar" <<'SH'
          #!/usr/bin/env sh
          exec ar "$@"
          SH

          chmod +x "$RUNNER_TEMP"/musl-tools/*
          echo "$RUNNER_TEMP/musl-tools" >> "$GITHUB_PATH"

          command -v clang
          command -v ar
          PATH="$RUNNER_TEMP/musl-tools:$PATH" command -v x86_64-linux-musl-gcc
          PATH="$RUNNER_TEMP/musl-tools:$PATH" command -v x86_64-linux-musl-ar
          PATH="$RUNNER_TEMP/musl-tools:$PATH" command -v aarch64-linux-musl-gcc
          PATH="$RUNNER_TEMP/musl-tools:$PATH" command -v aarch64-linux-musl-ar

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Build static client and CLI
        run: |
          cargo build --release -p vpsman-agent --target x86_64-unknown-linux-musl
          cargo build --release -p vpsman-agent --target aarch64-unknown-linux-musl
          cargo build --release -p vpsctl --target x86_64-unknown-linux-musl
          cargo build --release -p vpsctl --target aarch64-unknown-linux-musl

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

  docs-and-deploy:
    name: Repository and deploy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker Compose config
        run: |
          cp deploy/.env.example deploy/.env
          docker compose -f deploy/compose.yml config
