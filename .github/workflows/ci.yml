name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: rustup show

      - name: Install musl targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Build static client and CLI
        run: |
          cargo build --release -p vpsman-agent --target x86_64-unknown-linux-musl
          cargo build --release -p vpsman-agent --target aarch64-unknown-linux-musl
          cargo build --release -p vpsctl --target x86_64-unknown-linux-musl
          cargo build --release -p vpsctl --target aarch64-unknown-linux-musl

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

  docs-and-deploy:
    name: Repository and deploy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Public tree hygiene
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^(AGENTS\.md|DESIGN\.md|PROGRESS\.md|TODO_LIST\.md|DESIGN_GOAL\.md|docs/|tutorials/|scripts/|example_legacy_bird2_config\.zip)$|^(docs|tutorials|scripts)/'; then
            echo "private/local-only files must not be tracked"
            exit 1
          fi

      - name: Docker Compose config
        run: docker compose -f deploy/compose.yml config
